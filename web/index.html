<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MPE-RA</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100vh; height: 100dvh; background: #111; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        /* 100dvh = synlig hoyde uten Safari-linja pa iPhone; vh som fallback. */
        canvas { display: block; width: 100vw; height: 100vh; height: 100dvh; outline: none; }
        #loading {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            color: #ddd; font-family: system-ui, sans-serif; font-size: 20px; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Loading MPE-RA...</div>
    <canvas id="glcanvas" tabindex="1"></canvas>

    <!-- 1) miniquad/macroquad sin WebGL-loader -->
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <!-- 2) tynt skall: lyd + FFI (all UI er i Rust) -->
    <script src="bridge.js"></script>
    <!-- 3) start spillet -->
    <script>
        window.addEventListener("error", () => {
            const el = document.getElementById("loading");
            if (el) el.textContent = "Could not load WASM. Are you using a web server? (see README)";
        });
        setTimeout(() => { const el = document.getElementById("loading"); if (el) el.remove(); }, 1500);
        load("openrarust.wasm");
    </script>
</body>
</html>
